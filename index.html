<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDBTennis</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="page">
    
    <div class="topbar" aria-label="Barra superiore">
        <div class="topbar__inner">
            <div class="topbar__left">
                <a class="topbar__brand" href="index.html" aria-label="PDBTennis Home">
                    <span class="topbar__brandMark" aria-hidden="true">PT</span>
                    <span class="topbar__brandText">PDBTennis</span>
                </a>
            </div>

            <div class="topbar__right">
                <a class="topbar__link" href="#">SuperTennis</a>
                <a class="topbar__link" href="#">Guida TV</a>
                <a class="topbar__link" href="#">Live Score</a>
                <span class="topbar__sep" aria-hidden="true"></span>
                <a class="topbar__link topbar__link--cta" href="#">Accedi / Registrati</a>
            </div>
        </div>
    </div>

    
    <header class="header" aria-label="Navigazione principale">
        <div class="header__inner">
            <nav class="header__nav">
                <a class="header__link header__link--active" href="index.html">Tutte le news</a>
                <a class="header__link" href="pages/tornei.html">Cerca Tornei</a>
                <a class="header__link" href="#">Classifiche</a>
                <a class="header__link" href="#">Tesseramento</a>
                <a class="header__link" href="#">Biglietteria</a>
            </nav>

            <div class="header__tools" aria-label="Strumenti">
                <a class="header__iconBtn" href="#" aria-label="Cerca">
                    <span class="header__icon" aria-hidden="true">⌕</span>
                </a>
                <a class="header__iconBtn" href="#" aria-label="Menu">
                    <span class="header__icon" aria-hidden="true">≡</span>
                </a>
            </div>
        </div>
    </header>

    <main class="main">
        <section class="hero" aria-label="Sezione introduttiva">
            <div class="hero__inner">
                <div class="hero__content">
                    <h1 class="hero__title">Tornei, calendario e news dal tennis</h1>
                    <p class="hero__subtitle">
                        Segui i principali circuiti, scopri i tornei in evidenza e leggi le ultime novità.
                    </p>

                    <div class="hero__actions">
                        <a class="button button--primary" href="pages/tornei.html">Vedi tornei</a>
                        <a class="button button--ghost" href="pages/news.html">Ultime news</a>
                    </div>
                </div>

                <div class="hero__media" aria-hidden="true">
                    <div class="hero__image" role="img" aria-label="Campo da tennis"></div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
